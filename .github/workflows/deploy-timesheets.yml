name: Deploy Time Sheets to Pages

on:
  push:
    branches:
      - main
      - claude/pay-me-saas-build-uazJN
    paths:
      - 'timesheets/**'
      - '.github/workflows/deploy-timesheets.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deploys from racing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: timesheets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: timesheets/package-lock.json

      - run: npm ci

      - name: Build with GitHub Pages base path
        env:
          # Sets Vite `base` so asset URLs resolve at /<repo-name>/.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: timesheets/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
