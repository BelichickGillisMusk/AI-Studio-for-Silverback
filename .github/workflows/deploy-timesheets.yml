name: Deploy Silverback + Orozco + Time Sheets to Pages

on:
  push:
    branches:
      - main
      - claude/pay-me-saas-build-uazJN
    paths:
      - 'silverback/**'
      - 'orozco/**'
      - 'timesheets/**'
      - '.github/workflows/deploy-timesheets.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install silverback
        working-directory: silverback
        run: npm ci
      - name: Build silverback (root /)
        working-directory: silverback
        env:
          VITE_BASE_PATH: ${{ env.PAGES_BASE }}/
        run: npm run build

      - name: Install orozco
        working-directory: orozco
        run: npm ci
      - name: Build orozco (/orozco/)
        working-directory: orozco
        env:
          VITE_BASE_PATH: ${{ env.PAGES_BASE }}/orozco/
        run: npm run build

      - name: Install timesheets
        working-directory: timesheets
        run: npm ci
      - name: Build timesheets (/timesheets/)
        working-directory: timesheets
        env:
          VITE_BASE_PATH: ${{ env.PAGES_BASE }}/timesheets/
        run: npm run build

      - name: Assemble combined dist
        run: |
          mkdir -p combined-dist
          cp -r silverback/dist/. combined-dist/
          cp -r orozco/dist combined-dist/orozco
          cp -r timesheets/dist combined-dist/timesheets
          cp orozco/gbp.md combined-dist/gbp.md
          mkdir -p combined-dist/orozco/send
          cp -r orozco/send/. combined-dist/orozco/send/
          if [ -f combined-dist/timesheets/index.html ]; then
            cp combined-dist/timesheets/index.html combined-dist/timesheets/404.html
          fi
          ls -la combined-dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
