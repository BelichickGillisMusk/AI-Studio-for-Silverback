name: Deploy Homepage to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'homepage/**'
      - 'orozco/**'
      - 'scripts/build.sh'
      - '.github/workflows/deploy-cloudflare-homepage.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cloudflare-homepage
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            homepage/package-lock.json
            orozco/package-lock.json

      - name: Validate Cloudflare deploy settings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            echo "::error::Set repository variable CLOUDFLARE_PAGES_PROJECT_NAME." >&2
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set repository secret CLOUDFLARE_API_TOKEN." >&2
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Set repository secret CLOUDFLARE_ACCOUNT_ID." >&2
            exit 1
          fi

      - name: Build homepage bundle
        run: bash scripts/build.sh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public_dist --project-name ${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}
